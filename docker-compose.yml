services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://kafka:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 20s
      retries: 5
    networks:
      - neo-network

  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: neo_user
      POSTGRES_PASSWORD: neo_password
      POSTGRES_DB: neo_db
    volumes:
    - timescale-data:/var/lib/postgresql/data
    - ./db-init.sql:/docker-entrypoint-initdb.d/db-init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neo_user -d neo_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neo-network

  grafana:
    image: grafana/grafana:11.3.1
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - timescaledb
    networks:
      - neo-network

  neo-app:
    build: .
    container_name: neo-app
    working_dir: /app
    volumes:
    - ./:/app
    environment:
      NASA_API_KEY: ${NASA_API_KEY:-DEMO_KEY}
      START_DATE: ${START_DATE:-2024-01-01}
      END_DATE: ${END_DATE:-2024-01-07}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: neo-raw-data
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: neo_db
      DB_USER: neo_user
      DB_PASSWORD: neo_password
      PYTHONUNBUFFERED: 1
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    command: tail -f /dev/null
    networks:
      - neo-network

  neo-ui:
    image: python:3.12-slim
    container_name: neo-ui
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: neo_db
      DB_USER: neo_user
      DB_PASSWORD: neo_password
    ports:
      - "8501:8501"
    depends_on:
      - timescaledb
    command: tail -f /dev/null
    networks:
      - neo-network

volumes:
  kafka-data:
  timescale-data:
  grafana-data:

networks:
  neo-network:
    driver: bridge