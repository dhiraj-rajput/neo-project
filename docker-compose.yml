services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://kafka:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 20s
      retries: 5
    networks:
      - neo-network

  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-neo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-neo_password}
      POSTGRES_DB: ${DB_NAME:-neo_db}
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./src/db/history_init.sql:/docker-entrypoint-initdb.d/02_history_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-neo_user} -d ${DB_NAME:-neo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neo-network

  neo-app:
    build: .
    container_name: neo-app
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    command: tail -f /dev/null
    networks:
      - neo-network

  neo-api:
    build: .
    container_name: neo-api
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
    command: python -m uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - neo-network

  neo-frontend:
    image: oven/bun:latest
    container_name: neo-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "bun install && bun run dev --hostname 0.0.0.0"
    depends_on:
      - neo-api
    networks:
      - neo-network

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - neo-network

volumes:
  kafka-data:
  timescale-data:
  grafana-data:

networks:
  neo-network:
    driver: bridge
